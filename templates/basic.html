<!DOCTYPE html>
<html>
<head>
    <title>Basic Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="form-box">
    <h2>Basic Details</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Name"
               value="{{ data.get('name','') }}" required>

        <input type="text" name="branch" placeholder="Branch"
               value="{{ data.get('branch','') }}" required>

        <input type="text" name="college_name" placeholder="College Name"
               value="{{ data.get('college_name','') }}" required>

        <input type="text" name="year_passed" placeholder="Year Passed Out"
               value="{{ data.get('year_passed','') }}" required>

        <input type="email" name="email" placeholder="Email"
               value="{{ data.get('email','') }}" required>

        <input type="text" name="phone" placeholder="Phone"
               value="{{ data.get('phone','') }}" required>

        <input type="text" name="address" placeholder="Address"
               value="{{ data.get('address','') }}" required>

        <input type="date" name="dob"
               value="{{ data.get('dob','') }}" required>

        <button type="submit">Next</button>
    </form>
</div>
</body>
</html>
